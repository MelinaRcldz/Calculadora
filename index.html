<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Calculator</title>
  </head>
  <body>
    <main class="calculator">
      <section class="calculator-panel" aria-label="Calculadora simple">
        <h1 class="calculator-title">Calculadora</h1>
        <output class="calculator-display">0</output>
        <div class="calculator-keypad"></div>
      </section>

      <aside class="history-panel">
        <h2 class="history-title">Historial</h2>
        <ul class="history-list"></ul>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
